<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora de Precios</title>
<style>
:root{--p:#0f62fe;--bg:#eef2f7;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);padding:18px}
.app{max-width:1200px;margin:auto;background:#fff;border-radius:20px;padding:22px;box-shadow:0 15px 40px rgba(0,0,0,.08)}
h1{margin:0 0 8px}.muted{color:#666;margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1.5fr 90px 120px 120px 90px auto;gap:10px}
input,select,button{padding:11px;border:1px solid var(--line);border-radius:10px;font:inherit;min-width:0}
button{background:var(--p);color:#fff;border:none;font-weight:700;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:16px}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
.totals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.card{background:#f8fafc;padding:14px;border-radius:14px;font-weight:700}
@media(max-width:768px){.grid,.totals{grid-template-columns:1fr}table{display:block;overflow:auto;white-space:nowrap}}
</style></head><body>
<div class="app">
<h1>Calculadora de Precios</h1>
<div class="muted" id="status"></div>
<div class="grid">
<input id="search" placeholder="Buscar código o producto">
<select id="product"></select>
<input id="qty" type="number" min="1" value="1">
<input id="pub" readonly placeholder="Público">
<input id="emp" readonly placeholder="Empresario">
<input id="pts" readonly placeholder="Puntos">
<button id="add">Agregar</button>
</div>
<table><thead><tr><th>Código</th><th>Producto</th><th>Cant.</th><th>Público</th><th>Empresario</th><th>Puntos</th><th></th></tr></thead><tbody id="rows"></tbody></table>
<div class="totals">
<div class="card">Total Público: $<span id="t1">0.00</span></div>
<div class="card">Total Empresario: $<span id="t2">0.00</span></div>
<div class="card">Total Puntos: <span id="t3">0.00</span></div>
</div></div>

const $=i=>document.getElementById(i); let filtered=[...DB];
function num(v){return Number(v)||0}
function render(list){
filtered=list;$('product').innerHTML='';
list.forEach((p,i)=>{let o=document.createElement('option');o.value=i;o.textContent=p.Codigo+' - '+p.Producto;$('product').appendChild(o);});
$('status').textContent='Productos cargados: '+list.length; preview();
}
function preview(){
let p=filtered[$('product').value]; if(!p)return;
$('pub').value=num(p.PrecioPublico).toFixed(2);
$('emp').value=num(p.PrecioEmpresario).toFixed(2);
$('pts').value=num(p.Puntos).toFixed(2);
}
$('search').oninput=()=>{let q=$('search').value.toLowerCase();render(DB.filter(p=>String(p.Codigo).toLowerCase().includes(q)||String(p.Producto).toLowerCase().includes(q)));};
$('product').onchange=preview;
$('add').onclick=()=>{let p=filtered[$('product').value]; if(!p)return; let q=num($('qty').value)||1;
let tr=document.createElement('tr');
tr.innerHTML=`<td>${p.Codigo}</td><td>${p.Producto}</td><td>${q}</td><td>${(num(p.PrecioPublico)*q).toFixed(2)}</td><td>${(num(p.PrecioEmpresario)*q).toFixed(2)}</td><td>${(num(p.Puntos)*q).toFixed(2)}</td><td><button onclick="this.closest('tr').remove();tot()">X</button></td>`;
$('rows').appendChild(tr); tot();};
function tot(){let a=0,b=0,c=0;[...$('rows').rows].forEach(r=>{a+=num(r.cells[3].textContent);b+=num(r.cells[4].textContent);c+=num(r.cells[5].textContent);});
$('t1').textContent=a.toFixed(2);$('t2').textContent=b.toFixed(2);$('t3').textContent=c.toFixed(2);}
render(DB);
